name: sync-issue-status-on-merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues linked by Closes/Fixes/Resolves keywords
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const base = pr.base.ref;
            if (!['develop', 'master'].includes(base)) {
              core.info(`Skip base branch: ${base}`);
              return;
            }

            const text = [pr.title || '', pr.body || ''].join('\n');
            const regex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = new Set();

            let match;
            while ((match = regex.exec(text)) !== null) {
              issueNumbers.add(Number(match[1]));
            }

            if (!issueNumbers.size) {
              core.info('No closing keywords detected in PR title/body.');
              return;
            }

            for (const issue_number of issueNumbers) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                state: 'closed',
              });
              core.info(`Closed issue #${issue_number}`);
            }
